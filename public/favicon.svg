<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Outer tyre rim -->
  <circle cx="32" cy="32" r="30" fill="#012169" stroke="#FEB129" stroke-width="3"/>
  <!-- Inner tyre -->
  <circle cx="32" cy="32" r="20" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <!-- Tyre treads -->
  <g stroke="#444" stroke-width="2" fill="none">
    <line x1="32" y1="12" x2="32" y2="18"/>
    <line x1="32" y1="46" x2="32" y2="52"/>
    <line x1="12" y1="32" x2="18" y2="32"/>
    <line x1="46" y1="32" x2="52" y2="32"/>
    <line x1="17.9" y1="17.9" x2="22.1" y2="22.1"/>
    <line x1="41.9" y1="41.9" x2="46.1" y2="46.1"/>
    <line x1="46.1" y1="17.9" x2="41.9" y2="22.1"/>
    <line x1="22.1" y1="41.9" x2="17.9" y2="46.1"/>
  </g>
  <!-- Hub -->
  <circle cx="32" cy="32" r="10" fill="#FEB129"/>
  <!-- Hub bolts -->
  <circle cx="32" cy="25" r="2" fill="#012169"/>
  <circle cx="38.1" cy="29.5" r="2" fill="#012169"/>
  <circle cx="35.8" cy="37" r="2" fill="#012169"/>
  <circle cx="28.2" cy="37" r="2" fill="#012169"/>
  <circle cx="25.9" cy="29.5" r="2" fill="#012169"/>
  <!-- Center -->
  <circle cx="32" cy="32" r="3" fill="#012169"/>
</svg>
